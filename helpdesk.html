<!doctype html>
<html>

<head>
  <title>uCampus++ Contact</title>
  <link rel="stylesheet" href="helpdesk.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
</head>

<body>
  <div class="navbar">
    <a href="home.html" class="back-btn">←</a>

    <span class="nav-title">Helpdesk 📩</span>

    <div class="right-group">
      <a href="home.html" class="home-btn">Home</a>
      <span class="toggle" onclick="toggleMode()" id="modeIcon">☀️</span>
    </div>
  </div>

  <div class="container">
    <h2>Contact Us</h2>
    <p>Have any issue, suggestion or idea? Tell us 👇</p>

    <form onsubmit="sendMail(event)">
      <input type="text" id="name" placeholder="Your Name" required />

      <input type="email" id="email" placeholder="Your Email" required />

      <textarea id="message" placeholder="Write your message..." required></textarea>

      <button type="submit">Send Message</button>
    </form>

    <p id="status"></p>

    <a href="home.html">
      <button class="back">⬅ Back</button>
    </a>
  </div>

  <script src="theme.js"></script>
  <script>
    (function () {
      emailjs.init("h3JpsJW91pEwacCi0");
    })();

    function sendMail(e) {
      e.preventDefault();

      let params = {
        from_name: document.getElementById("name").value,
        from_email: document.getElementById("email").value,
        message: document.getElementById("message").value,
      };

      emailjs.send("service_phpo5j9", "template_bccbhoe", params).then(
        function () {
          document.getElementById("status").innerText =
            "Message Sent Successfully! ✅ ";

          document.querySelector("form").reset();

          setTimeout(function () {
            location.reload();
          }, 2000);
        },
        function () {
          document.getElementById("status").innerText = "Failed to send! ❌";
        },
      );
    }
  </script>
</body>

</html>
